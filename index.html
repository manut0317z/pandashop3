<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Shop</title><style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#1a001f,#3a004f);color:white;text-align:center;}
header{padding:20px;font-size:30px;color:#ff66cc;}
.card{background:#2a0033;margin:20px;padding:25px;border-radius:15px;box-shadow:0 0 15px #ff33cc;}
input{padding:12px;font-size:18px;width:140px;text-align:center;border-radius:10px;border:none;}
button{padding:12px 25px;margin-top:15px;background:#ff33cc;border:none;border-radius:12px;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#ff66dd;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;}
.popup-box{background:#2a0033;padding:30px;border-radius:15px;box-shadow:0 0 20px #ff33cc;}
</style></head><body><header>🐼 Panda Shop Topup</header>
<p>กรอกจำนวนแล้วกดสั่งซื้อ</p><!-- FREE FIRE --><div class="card">
  <h2>Free Fire</h2>
  <input type="number" id="ff" value="33"><br>
  <button onclick="previewOrder('Free Fire','ff')">สั่งซื้อ</button>
</div><!-- ROV --><div class="card">
  <h2>ROV</h2>
  <input type="number" id="rov" value="60"><br>
  <button onclick="previewOrder('ROV','rov')">สั่งซื้อ</button>
</div><!-- MOBILE LEGENDS --><div class="card">
  <h2>Mobile Legends</h2>
  <input type="number" id="ml" value="86"><br>
  <button onclick="previewOrder('Mobile Legends','ml')">สั่งซื้อ</button>
</div><!-- POPUP --><div class="popup" id="popup">
  <div class="popup-box">
    <h3>ยืนยันคำสั่งซื้อ</h3>
    <p id="summary"></p>
    <button onclick="sendOrder()">ไปแชท & ส่งข้อความ</button><br>
    <button onclick="closePopup()">ยกเลิก</button>
  </div>
</div><script>
let currentMsg = "";

function previewOrder(game,id){
  let val = document.getElementById(id).value || 1;
  let orderId = 'PS' + Math.floor(Math.random()*100000);

  currentMsg = `🧾 รหัสออเดอร์: ${orderId}\n🎮 ${game}\n💎 ${val}\n\n📌 แจ้ง UID และแนบสลิป`;

  document.getElementById('summary').innerText = `${game} จำนวน ${val}`;
  document.getElementById('popup').style.display = 'flex';
}

function sendOrder(){
  let text = encodeURIComponent(currentMsg);

  let url1 = "https://m.me/pandashop01?text=" + text;
  let url2 = "https://www.facebook.com/messages/t/pandashop01?text=" + text;

  let win = window.open(url1, "_blank");

  setTimeout(()=>{
    if(!win || win.closed){
      window.location.href = url2;
    }
  }, 500);
}

function closePopup(){
  document.getElementById('popup').style.display = 'none';
}
</script><!-- ปุ่มสำรอง Facebook Lite --><div style="margin:20px;">
  <p>❗ หากกดแล้วไม่ไปแชท (ใช้ Facebook Lite)</p>
  <a href="https://m.me/pandashop01" target="_blank" style="display:inline-block;padding:12px 20px;background:#00c853;border-radius:10px;color:white;text-decoration:none;">
    👉 เปิดแชทโดยตรง
  </a>
  <p style="margin-top:10px;font-size:14px;opacity:0.8;">แนะนำ: กด ⋮ แล้วเลือก "เปิดใน Chrome"</p>
</div></body>
</html>
