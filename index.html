<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#3a004f,#0b0010);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

header{
  padding:25px;
  font-size:32px;
  color:#ff4fd8;
  font-weight:bold;
  text-shadow:0 0 10px #ff4fd8;
}

/* card */
.card{
  background:rgba(255,255,255,0.06);
  margin:20px auto;
  padding:20px;
  border-radius:18px;
  width:90%;
  max-width:420px;
  border:1px solid rgba(255,79,216,0.3);
  transition:0.3s;
  backdrop-filter: blur(6px);
}

.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(255,79,216,0.5);
}

select,input{
  width:90%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  text-align:center;
  background:#1a1a1a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  background:linear-gradient(90deg,#ff4fd8,#ff7ad9);
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px #ff4fd8;
}

/* hidden animation */
.hidden{
  display:none;
  animation:fade 0.3s ease-in-out;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.note{
  font-size:12px;
  opacity:0.7;
  margin-top:8px;
}
</style>

</head>

<body>

<header>🐼 Panda Shop</header>

<div class="card">

  <select id="game" onchange="changeForm()">
    <option value="">-- เลือกเกม --</option>
    <option value="ff">Free Fire</option>
    <option value="rov">ROV</option>
    <option value="ml">Mobile Legends</option>
  </select>

  <div class="note" id="hint">เลือกเกมเพื่อเริ่มสั่งซื้อ</div>

  <!-- FF -->
  <div id="ff_box" class="hidden">
    <input type="text" id="ff_uid" placeholder="UID Free Fire">
    <input type="number" id="ff_amount" placeholder="จำนวนเพชร">
    <button onclick="order('Free Fire','ff_uid','ff_amount')">สั่งซื้อ</button>
  </div>

  <!-- ROV -->
  <div id="rov_box" class="hidden">
    <input type="text" id="rov_uid" placeholder="UID ROV">
    <input type="number" id="rov_amount" placeholder="จำนวนคูปอง">
    <button onclick="order('ROV','rov_uid','rov_amount')">สั่งซื้อ</button>
  </div>

  <!-- ML -->
  <div id="ml_box" class="hidden">
    <input type="text" id="ml_data" placeholder="UID Zone เช่น 123738 2728">
    <input type="number" id="ml_amount" placeholder="จำนวนเพชร">
    <button onclick="orderML()">สั่งซื้อ</button>
  </div>

</div>

<script>

function changeForm(){

  document.querySelectorAll(".hidden").forEach(e=>e.style.display="none");

  const game = document.getElementById("game").value;

  let hint = document.getElementById("hint");

  if(game === "ff"){
    document.getElementById("ff_box").style.display="block";
    hint.innerText="Free Fire → ใส่ UID + จำนวนเพชร";
  }

  if(game === "rov"){
    document.getElementById("rov_box").style.display="block";
    hint.innerText="ROV → ใส่ UID + จำนวนคูปอง";
  }

  if(game === "ml"){
    document.getElementById("ml_box").style.display="block";
    hint.innerText="Mobile Legends → UID + Zone (เช่น 123 4567)";
  }
}

// FF + ROV
function order(game,uidId,amountId){

  const uid=document.getElementById(uidId).value;
  const amount=document.getElementById(amountId).value||1;

  if(!uid){alert("กรุณากรอก UID");return;}

  sendMsg(game,uid,"-",amount);
}

// ML
function orderML(){

  const data=document.getElementById("ml_data").value.trim();
  const amount=document.getElementById("ml_amount").value||1;

  if(!data){alert("กรอก UID + Zone");return;}

  const parts=data.split(" ");
  const uid=parts[0];
  const zone=parts[1];

  sendMsg("Mobile Legends",uid,zone,amount);
}

// ส่ง
function sendMsg(game,uid,zone,amount){

  const orderId="PS"+Math.floor(Math.random()*100000);

  const msg=
`Panda Shop Order
Order ID: ${orderId}
Game: ${game}
UID: ${uid}
Zone: ${zone}
Amount: ${amount}`;

  const encoded=encodeURIComponent(msg);

  window.location.href="https://m.me/pandashop01";

  setTimeout(()=>{
    window.open("https://www.facebook.com/messages/t/pandashop01?text="+encoded,"_blank");
  },800);

}

</script>

</body>
</html>
